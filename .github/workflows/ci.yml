name: CI

# Guards the parity surface: the workspace test suite includes the generated
# parity drift guards (crates/rudel-lang reference_parity / api_inventory /
# reference_snapshot, plus the rudel-mini mini/tonal goldens), so a change that
# silently alters Rudel's exposed names or its hap-for-hap behavior fails here.
# These tests embed committed JSON/text goldens, so they need no vendored
# `strudel/` checkout. Mirrors the check commands documented in the README.

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries for the GUI (`eframe`/egui) and audio (`cpal`/ALSA)
      # crates so the whole workspace builds on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
